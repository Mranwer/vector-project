openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Vector Technology Digital Services API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: wallet
    description: Wallet & points
  - name: services
    description: Services marketplace
  - name: orders
    description: Order management
  - name: payments
    description: Payment gateway
  - name: admin
    description: Admin panel

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # USERS
  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # WALLET
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balance and info
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [wallet]
      summary: Get transaction history
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /wallet/recharge/order:
    post:
      operationId: createRechargeOrder
      tags: [wallet]
      summary: Create Razorpay order for recharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RechargeInput"
      responses:
        "200":
          description: Razorpay order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayOrder"

  /wallet/recharge/verify:
    post:
      operationId: verifyRecharge
      tags: [wallet]
      summary: Verify and complete wallet recharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Recharge successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # SERVICES
  /services:
    get:
      operationId: getServices
      tags: [services]
      summary: List all active services
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Services list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"

  /services/categories:
    get:
      operationId: getCategories
      tags: [services]
      summary: Get all service categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ORDERS
  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get user's orders
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Purchase a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # DASHBOARD SUMMARY (wow endpoint)
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [users]
      summary: Get user dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # PAYMENTS
  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: Get user payment history
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  # ADMIN AUTH
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Admin logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # ADMIN STATS
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ADMIN USERS
  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/users/{id}:
    get:
      operationId: getAdminUser
      tags: [admin]
      summary: Get user detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update user status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/wallet:
    patch:
      operationId: adjustUserWallet
      tags: [admin]
      summary: Manually adjust user wallet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAdjustInput"
      responses:
        "200":
          description: Wallet adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # ADMIN SERVICES
  /admin/services:
    get:
      operationId: getAdminServices
      tags: [admin]
      summary: List all services (admin)
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [admin]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /admin/services/{id}:
    patch:
      operationId: updateService
      tags: [admin]
      summary: Update a service
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [admin]
      summary: Delete a service
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ADMIN ORDERS
  /admin/orders:
    get:
      operationId: getAdminOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /admin/orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [admin]
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ADMIN PAYMENTS
  /admin/payments:
    get:
      operationId: getAdminPayments
      tags: [admin]
      summary: List all payments (admin)
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  # CONTACT
  /contact:
    post:
      operationId: submitContact
      tags: [users]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # AUTH SCHEMAS
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # USER SCHEMAS
    User:
      type: object
      required: [id, name, email, role, status, walletBalance, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, suspended, banned]
        walletBalance:
          type: integer
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    AdminUserUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [active, suspended, banned]
        role:
          type: string
          enum: [user, admin]

    AdminUserDetail:
      type: object
      required: [user, orders, transactions]
      properties:
        user:
          $ref: "#/components/schemas/User"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    AdminUserListResponse:
      type: object
      required: [users, total, page, pages]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    # WALLET SCHEMAS
    Wallet:
      type: object
      required: [balance, userId]
      properties:
        balance:
          type: integer
        userId:
          type: string
        totalRecharged:
          type: integer
        totalSpent:
          type: integer

    Transaction:
      type: object
      required: [id, userId, type, amount, description, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [credit, debit]
        amount:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [success, failed, pending]
        referenceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TransactionListResponse:
      type: object
      required: [transactions, total, page, pages]
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    RechargeInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          minimum: 10

    RazorpayOrder:
      type: object
      required: [orderId, amount, currency, keyId]
      properties:
        orderId:
          type: string
        amount:
          type: integer
        currency:
          type: string
        keyId:
          type: string

    PaymentVerifyInput:
      type: object
      required: [razorpayOrderId, razorpayPaymentId, razorpaySignature]
      properties:
        razorpayOrderId:
          type: string
        razorpayPaymentId:
          type: string
        razorpaySignature:
          type: string

    # SERVICE SCHEMAS
    Service:
      type: object
      required: [id, title, description, pointsCost, deliveryTime, category, status, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnail:
          type: ["string", "null"]
        pointsCost:
          type: integer
        deliveryTime:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [active, inactive]
        features:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ServiceInput:
      type: object
      required: [title, description, pointsCost, deliveryTime, category]
      properties:
        title:
          type: string
        description:
          type: string
        thumbnail:
          type: string
        pointsCost:
          type: integer
        deliveryTime:
          type: string
        category:
          type: string
        features:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]

    ServiceUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        thumbnail:
          type: string
        pointsCost:
          type: integer
        deliveryTime:
          type: string
        category:
          type: string
        features:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]

    ServiceListResponse:
      type: object
      required: [services, total, page, pages]
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    Category:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    # ORDER SCHEMAS
    Order:
      type: object
      required: [id, userId, serviceId, serviceName, pointsCost, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        serviceCategory:
          type: ["string", "null"]
        pointsCost:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, cancelled]
        notes:
          type: ["string", "null"]
        deliveryTime:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderInput:
      type: object
      required: [serviceId]
      properties:
        serviceId:
          type: string
        notes:
          type: string

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, processing, completed, cancelled]

    OrderListResponse:
      type: object
      required: [orders, total, page, pages]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        pages:
          type: integer

    # PAYMENT SCHEMAS
    Payment:
      type: object
      required: [id, userId, amount, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        amount:
          type: integer
        pointsAdded:
          type: integer
        razorpayOrderId:
          type: string
        razorpayPaymentId:
          type: ["string", "null"]
        status:
          type: string
          enum: [created, paid, failed]
        createdAt:
          type: string
          format: date-time

    # DASHBOARD
    DashboardSummary:
      type: object
      required: [walletBalance, totalOrders, activeOrders, completedOrders, recentTransactions, recentOrders]
      properties:
        walletBalance:
          type: integer
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        completedOrders:
          type: integer
        totalSpent:
          type: integer
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    # ADMIN STATS
    AdminStats:
      type: object
      required: [totalUsers, totalOrders, totalRevenue, activeServices, pendingOrders, recentOrders, recentPayments]
      properties:
        totalUsers:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: integer
        activeServices:
          type: integer
        pendingOrders:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recentPayments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"

    WalletAdjustInput:
      type: object
      required: [amount, type, description]
      properties:
        amount:
          type: integer
        type:
          type: string
          enum: [credit, debit]
        description:
          type: string

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
